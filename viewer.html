<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>전자책 보기</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" as="style" crossorigin
  href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <a href="index.html" class="brand">
      <img src="assets/logo.png" alt="동명대학교" class="brand-logo">
      <span class="brand-text">
        <span class="brand-eyebrow">동명대학교 진로취업지원센터</span>
        <span class="brand-name">전자책 서가</span>
      </span>
    </a>
  </div>
</header>

<main class="wrap">
  <a href="index.html" class="back-link">&larr; 목록으로</a>

  <div class="viewer-head">
    <div class="viewer-titleblock">
      <h1 id="bookTitle">불러오는 중…</h1>
      <p id="bookAuthor"></p>
    </div>
    <button id="downloadBtn" class="download-btn">
      다운로드
      <span class="count" id="downloadCount"></span>
    </button>
  </div>

  <div class="viewer-frame-wrap">
    <iframe id="pdfFrame" title="PDF 미리보기"></iframe>
  </div>
</main>

<script src="viewer.js"></script>
</body>
</html>
